name: Feature request
description: Suggest a system, chip, format, or capability.
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New system / machine
        - Chip accuracy
        - Media / format support
        - UI / shell
        - Scripting / MCP surface
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What's missing
      description: What can't you do today, and on which system?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
      description: What should happen instead? Hardware references or examples help.
    validations:
      required: false
